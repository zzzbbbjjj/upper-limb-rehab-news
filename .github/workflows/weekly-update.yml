name: Weekly Paper Fetch

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch new papers
        run: python scripts/fetch_papers.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate papers.json
        run: node scripts/generate-papers-json.mjs

      - name: Commit and push
        run: |
          git config user.name "research-bot"
          git config user.email "bot@upper-limb-rehab-news.dev"
          git add content/papers/ src/data/papers.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📄 Weekly paper update — $(date +%Y-%m-%d)"
            git push
          fi
